<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Transición Caja</title>
    <style>
        .caja {
            width: 100px;
            height: 100px;
            background-color: #3498db;
            transition: all 0.3s ease;
        }

        .caja:hover {
            width: 150px;
            height: 150px;
        }
    </style>
</head>
<body>
    <div class="caja"></div>
</body>
</html>

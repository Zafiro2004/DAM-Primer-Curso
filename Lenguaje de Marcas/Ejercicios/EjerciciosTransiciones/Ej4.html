<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Transición - Cuadrado</title>
    <style>
        body {
            margin: 50px;
        }

        .cuadrado {
            width: 100px;
            height: 100px;
            background-color: #3498db;
            transition: transform 1s ease;
            cursor: pointer;
        }

        .cuadrado:hover {
            transform: translateX(200px);
        }
    </style>
</head>
<body>
    <div class="cuadrado"></div>
</body>
</html>

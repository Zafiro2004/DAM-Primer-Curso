<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="UTF-8">
    <title>Contacto | TechNova</title>
    <link rel="stylesheet" href="styles.css">
</head>

<body>
    <header>
        <div class="logo">TechNova</div>
        <nav><a href="index.html">Inicio</a><a href="productos.html">Productos</a><a href="contacto.html">Contacto</a>
        </nav>
    </header>

    <main class="container" style="max-width: 600px;">
        <div style="background: white; padding: 40px; border-radius: 15px;">
            <h1>Contacto</h1>
            <form>
                <label style="display: block; margin-bottom: 5px;">Email</label>
                <input type="email"
                    style="width: 100%; padding: 10px; margin-bottom: 20px; border: 1px solid #ddd; border-radius: 5px;">

                <label style="display: block; margin-bottom: 5px;">Mensaje</label>
                <textarea rows="5"
                    style="width: 100%; padding: 10px; margin-bottom: 20px; border: 1px solid #ddd; border-radius: 5px;"></textarea>

                <button type="submit" class="btn" style="width: 100%;">Enviar</button>
            </form>
        </div>
    </main>
    <footer>
        <p>&copy; 2026 TechNova S.L.</p>
    </footer>
</body>

</html>

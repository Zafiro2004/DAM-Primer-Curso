<!doctype html>
<html lang="es">
<head>
    <meta charset="utf-8" />
    <title>Ejercicio: inline-block vs position:absolute</title>
    <style>
        /* contenedor: position:relative para que el absoluto se posicione respecto a él */
        .container {
            position: relative;
            border: 1px solid #ccc;
            padding: 16px;
            width: 420px;
            height: 140px;
            background: #fafafa;
        }

        /* cajas en línea */
        .box {
            display: inline-block;
            width: 120px;
            height: 100px;
            margin: 0 8px;
            vertical-align: top;
            color: #fff;
            font-weight: bold;
            text-align: center;
            line-height: 100px;
            box-sizing: border-box;
        }

        .left { background: #4aa3df; }
        .middle {
            background: #ef6f6f;
            /* La línea siguiente quita la caja del flujo normal */
            position: absolute;
            top: 16px;
            left: 140px;
        }
        .right { background: #7bc96f; }
    </style>
</head>
<body>

    <div class="container">
        <div class="box left">Izquierda</div>
        <div class="box middle">Medio (abs)</div>
        <div class="box right">Derecha</div>
    </div>

    
</body>
</html>

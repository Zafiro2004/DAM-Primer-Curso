<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<header><title>Ejercicio 1 Flex</title></header>
<style>
body {
    margin: 0;
    padding: 0;
}

ul {
    display: flex;
    list-style: none;
    margin: 0;
    padding: 0;
    width: 100%;
    background-color: cyan;
}

li {
    flex: 1;
}

li a {
    display: block;
    padding: 15px;
    text-align: center;
    color: black;
    text-decoration: none;
}

a:hover {
    background-color: #555;
}
</style>
</head>
<body>
<ul>
<li><a href="#">Home</a></li>
<li><a href="#">Servicios</a></li>
<li><a href="#">Opciones</a></li>
<li><a href="#">Planes</a></li>
<li><a href="#">Contacto</a></li>
</ul>
</body>

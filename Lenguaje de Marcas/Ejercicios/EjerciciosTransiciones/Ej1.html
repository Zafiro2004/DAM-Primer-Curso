<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Transición de Color</title>
    <style>
        .caja {
            width: 200px;
            height: 200px;
            background-color: #3498db;
            transition: background-color 3s ease;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            font-family: Arial, sans-serif;
            color: white;
            border-radius: 8px;
        }

        .caja:hover {
            background-color: #e74c3c;
        }
    </style>
</head>
<body>
    <div class="caja">Pasa el ratón aquí</div>
</body>
</html>

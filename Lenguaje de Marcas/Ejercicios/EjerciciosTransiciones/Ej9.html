<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Transición de Max-Height</title>
    <style>
        .contenedor {
            width: 300px;
            border: 4px solid #ccc;
            overflow: hidden;
            transition: max-height 0.5s ease;
            max-height: 0;
        }

        .contenedor:hover {
            max-height: 100px;
        }

        .texto {
            padding: 10px;
        }
    </style>
</head>
<body>
    <div class="contenedor">
        <div class="texto">
            Este es el texto que se mostrará al pasar el ratón por el contenedor.
        </div>
    </div>
</body>
</html>

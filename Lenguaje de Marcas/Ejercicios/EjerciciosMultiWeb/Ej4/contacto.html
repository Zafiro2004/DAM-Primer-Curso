<main>
    <h1>Contacto</h1>
    <div class="grid">
        <section>
            <h2>¡Hablemos!</h2>
            <p>Si tienes un proyecto en mente o solo quieres saludar, completa el formulario.</p>
            <img src="https://picsum.photos/400/300?random=5" alt="Contacto" class="img-fluid">
        </section>

        <section class="card">
            <form>
                <label>Nombre:</label>
                <input type="text" placeholder="Tu nombre">
                <label>Email:</label>
                <input type="email" placeholder="correo@ejemplo.com">
                <label>Mensaje:</label>
                <textarea rows="5"></textarea>
                <button type="submit">Enviar Mensaje</button>
            </form>
        </section>
    </div>
</main>

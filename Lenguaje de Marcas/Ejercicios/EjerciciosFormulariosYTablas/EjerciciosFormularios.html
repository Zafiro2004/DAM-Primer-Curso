<!DOCTYPE html>
<html lang="es">
    <head>
        <meta charset="utf-8">
        <title> Ejercicios Formularios </title>
    </head>
    <body>
        <h1> Ejercicio 1 y 2 </h1>
        <form>
            <label for="nombre"> Nombre y apellidos: </label>
            <input type="text" id="nombre" name="nombre" required> <br>
            <label for="email"> Correo electrónico: </label>
            <input type="email" id="email" name="email" required> <br>
            <button type="submit"> Enviar </button>
        </form>
        <h1> Ejercicio 3 </h1>
        <form>
        <label for="nombre"> Nombre y apellidos: </label>
        <input type="text" id="nombre" name="nombre" required> <br>
        <label for="edad"> Edad: </label>
        <input type="number" id="edad" name="edad" required> <br>
        <button type="submit"> Enviar </button>
        </form>
        <h1> Ejercicio 4 </h1>
        <form>
            <p> Elige tu color favorito: </p>
            <input type ="radio" id="colores" name="opciones" value="Rojo">
            <label for="colores"> Rojo </label>
            <input type ="radio" id="colores" name="opciones" value="Verde">
            <label for="colores"> Verde </label>
            <input type ="radio" id="colores" name="opciones" value="Azul">
            <label for="colores"> Azul </label> <br>
            <button type="submit"> Enviar </button> 
        </form>
        <h1> Ejercicio 5 </h1>
        <p> Elige tus hobbies: </p>
        <form>
            <input type="checkbox" id="hobby1" name="hobby1" value="Leer">
            <label for="hobby1"> Leer </label><br>
            <input type="checkbox" id="hobby2" name="hobby2" value="Deporte">
            <label for="hobby2"> Deporte </label><br>
            <input type="checkbox" id="hobby3" name="hobby3" value="Viajar">
            <label for="hobby3"> Viajar </label> <br>
            <button type="submit"> Enviar </button>
        </form>
        <h1> Ejercicio 6 </h1>
        <p>Selecciona tu país: </p>
        <form>
            <label for="pais"> País: </label>
            <select id="pais" name="pais">
                <option value="espana"> España </option>
                <option value="francia"> Francia </option>
                <option value="italia"> Italia </option>
                <option value="alemania"> Alemania </option>
            </select> <br>
            <button type="submit"> Enviar </button>
        </form>
        <h1> Ejercicio 7 </h1>
        <form>
            <label for="comentarios"> Comentarios: </label> <br>
            <textarea id="comentarios" name="comentarios" rows="4" cols="50" placeholder="Escribe tus comentarios aquí..."></textarea> <br>
            <button type="submit"> Enviar </button>
        </form>
    </body>
</html>
